<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physical Steam Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Steam Game Card Generator</h1>
</header>

<main>
    <section id="controls">

        <button id="steamLoginBtn">Login with Steam</button>

        <div id="userInfo"></div>

        <label>Choose a Game:</label>
        <select id="gameSelect"></select>

        <label>Choose a Style:</label>
        <select id="styleSelect">
            <option value="modern">Modern Case</option>
            <option value="retro">Retro Case</option>
            <option value="minimal">Minimalist</option>
        </select>

        <button id="generateBtn">Generate Card</button>
    </section>

    <section id="preview">
        <h2>Card Preview</h2>
        <div id="card"></div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
